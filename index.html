<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grade 2 Math Adventure</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="index">
  <header class="top-nav">
    <div class="nav-left"><strong>Grade 2 Math Adventure</strong></div>
    <div class="nav-right"><span>Completed: <strong data-done-count>0 / 15</strong></span></div>
  </header>

  <main class="container">
    <section class="hero card">
      <h1>Pick Your Day 🎒</h1>
      <p>Two sessions per day. Write answers on paper, track progress in the app.</p>
      <p><strong>Last active day:</strong> <span data-active-day>None yet</span> • <strong>Total practice time:</strong> <span data-total-time>0m 0s</span></p>
      <p><a class="btn btn-primary" href="parent.html" data-animate="button">Parent Dashboard</a></p>
    </section>

    <nav class="progress-tracker" data-progress-tracker aria-label="Day Progress"></nav>

    <section class="day-grid" data-day-grid></section>

    <p class="footer-note">Works offline after first load. Optimized for iPad Safari touch targets.</p>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
