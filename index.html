<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Grade 2 Math Adventure</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="index">
  <header class="top-nav">
    <div class="nav-left"><strong>Grade 2 Math Adventure</strong></div>
    <div class="nav-right"><span>Progress: <strong data-done-count>0 / 15</strong></span></div>
  </header>

  <main class="container">
    <section class="hero card">
      <h1>Pick Your Day 🎒</h1>
      <p>Every day has two sessions (morning + afternoon), each with 25 questions grouped by level.</p>
    </section>

    <nav class="progress-tracker" data-progress-tracker aria-label="Day Progress"></nav>

    <section class="day-grid" data-day-grid></section>

    <p class="footer-note">Tip: This app works offline after loading once, and answers are written on paper.</p>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
