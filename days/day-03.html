<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Day 3 • Grade 2 Math Adventure</title>
  <link rel="stylesheet" href="../assets/style.css" />
</head>
<body data-page="day" data-day="3">
  <header class="top-nav">
    <div class="nav-left button-group button-group--stack-mobile">
      <a class="btn" href="../index.html">🏠 Home</a>
      <a class="btn" data-prev-day href="#">← Previous Day</a>
      <a class="btn" data-next-day href="#">Next Day →</a>
    </div>
    <div class="nav-right">
      <label>Go to Day:
        <select data-day-jump></select>
      </label>
    </div>
  </header>

  <main class="container">
    <nav class="progress-tracker" data-progress-tracker aria-label="Day Progress"></nav>

    <section class="card hero">
      <h1 data-day-title></h1>
      <p data-day-note></p>
      <p><strong>Start with this:</strong> <span data-day-inspiration></span> ✨</p>
      <div class="session-buttons">
        <button class="btn btn-primary" data-start-session="morning" data-animate="button">Morning Session</button>
        <button class="btn btn-primary" data-start-session="afternoon" data-animate="button">Afternoon Session</button>
      </div>
    </section>

    <section data-resume></section>

    <section class="card" data-session-panel>
      <h2 data-session-title>Choose a session to begin</h2>
      <div class="card" data-timer-card></div>
      <div class="pills" data-section-pills></div>
      <div data-session-content></div>
    </section>

    <section data-session-summary></section>

    <section class="card parent-panel hidden" data-parent-panel>
      <h3>Parent Snapshot</h3>
      <div data-parent-snapshot></div>
    </section>

    <section class="card" data-parent-toggle-wrap>
      <label><input type="checkbox" data-parent-toggle /> Show Parent Panel</label>
    </section>

    <section class="card" data-focus-wrap>
      <label><input type="checkbox" data-focus-toggle /> Focus Mode</label>
      <p class="footer-note">Shows only the most important learning controls.</p>
    </section>

    <section class="card" data-sound-wrap>
      <label><input type="checkbox" data-sound-toggle /> Sound Effects (optional)</label>
      <p class="footer-note">No autoplay. Sound plays only after taps.</p>
    </section>

    <section class="card hidden" data-finish-day>
      <h3>🏁 Finish Day</h3>
      <p data-finish-day-msg>This unlocks after both Morning and Afternoon are complete.</p>
      <button class="btn btn-primary" data-finish-day-btn data-animate="button">Mark Day Complete</button>
    </section>
  </main>

  <script src="../assets/script.js"></script>
</body>
</html>
