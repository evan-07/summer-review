<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>15-Day Grade 2 Math Enrichment Plan</title>
  <style>
    :root {
      --bg: #f5f8ff;
      --card: #ffffff;
      --ink: #1f2937;
      --line: #d8e1f2;
      --accent: #1d4ed8;
      --soft: #e9f0ff;
      --theme-page: #f5f8ff;
      --theme-card: #ffffff;
      --theme-line: #d8e1f2;
      --theme-glow: rgba(29, 78, 216, 0.1);
      --theme-accent: #1d4ed8;
      --theme-header: linear-gradient(135deg, #dff4ff, #eef8ff);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(255, 255, 255, 0.8), transparent 30%),
        radial-gradient(circle at 90% 20%, rgba(255, 255, 255, 0.65), transparent 26%),
        var(--theme-page);
      color: var(--ink);
      font-size: 24px;
      line-height: 1.75;
      transition: background 250ms ease;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 30;
      background: color-mix(in srgb, var(--theme-page) 94%, white);
      border-bottom: 1px solid var(--theme-line);
      padding: 14px;
      backdrop-filter: blur(4px);
    }

    .topbar {
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: 1.15rem;
      color: #0f2f75;
    }

    .small-btn {
      border: none;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      font-size: 0.82rem;
      font-weight: 700;
      padding: 10px 14px;
      cursor: pointer;
    }

    main {
      max-width: 1000px;
      margin: 18px auto 80px;
      padding: 0 14px;
    }

    .panel {
      background: var(--theme-card);
      border: 1px solid var(--theme-line);
      border-radius: 22px;
      padding: 18px;
      box-shadow: 0 8px 24px var(--theme-glow);
    }

    .hidden { display: none !important; }

    .index-title {
      margin: 0 0 10px;
      text-align: center;
      color: #123f93;
      font-size: 1.45rem;
    }

    .index-help {
      margin: 0 0 18px;
      text-align: center;
      color: #42526f;
      font-size: 0.9rem;
    }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }

    .day-link {
      border: 2px solid color-mix(in srgb, var(--theme-line) 78%, white);
      border-radius: 18px;
      background: color-mix(in srgb, var(--theme-card) 90%, white);
      text-align: left;
      padding: 12px;
      cursor: pointer;
      transition: transform 120ms ease;
    }

    .day-link:hover {
      transform: translateY(-2px);
    }

    .day-link strong {
      display: block;
      color: #153a8a;
      font-size: 0.95rem;
      margin-bottom: 2px;
    }

    .day-link span {
      display: block;
      font-size: 0.82rem;
      color: #394a67;
      line-height: 1.4;
    }

    .theme-badge {
      display: inline-block;
      margin-top: 6px;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      background: color-mix(in srgb, var(--theme-card) 55%, var(--theme-page));
      color: #1e3a8a;
    }

    .day-header {
      border-radius: 16px;
      padding: 14px;
      color: #10274f;
      margin-bottom: 12px;
      background: var(--theme-header);
      border: 1px solid color-mix(in srgb, var(--theme-line) 75%, white);
    }

    .day-header h2 {
      margin: 0;
      font-size: 1.35rem;
    }

    .day-header p {
      margin: 4px 0 0;
      font-size: 0.85rem;
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }

    .select-btn {
      border: 2px solid #c9d5f7;
      background: #fff;
      color: #17367f;
      border-radius: 12px;
      padding: 10px;
      font-size: 0.85rem;
      font-weight: 800;
      cursor: pointer;
    }

    .select-btn.active {
      background: #1d4ed8;
      color: #fff;
      border-color: #1d4ed8;
    }

    .section-card {
      border: 1px solid color-mix(in srgb, var(--theme-line) 78%, white);
      border-radius: 16px;
      padding: 16px;
      background: color-mix(in srgb, var(--theme-card) 92%, white);
    }

    .section-title {
      margin: 0 0 6px;
      font-size: 1.1rem;
      color: color-mix(in srgb, var(--theme-accent) 65%, #132446);
    }

    .section-subtitle {
      margin: 0 0 12px;
      font-size: 0.82rem;
      color: #4b5e80;
    }

    ol {
      margin: 0 0 4px 32px;
      padding: 0;
    }

    li {
      margin: 16px 0;
      font-size: 1rem;
    }

    .stepper {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      margin-top: 14px;
    }

    .stepper button {
      flex: 1;
      border: none;
      border-radius: 12px;
      background: #1d4ed8;
      color: #fff;
      font-size: 0.9rem;
      font-weight: 800;
      padding: 12px;
      cursor: pointer;
    }

    .stepper button:disabled {
      background: #a8b9e2;
      cursor: not-allowed;
    }

    .progress {
      margin-top: 8px;
      font-size: 0.8rem;
      color: #4f5f80;
      text-align: center;
    }

    .theme-1 { background: linear-gradient(135deg, #dff4ff, #eef8ff); }
    .theme-2 { background: linear-gradient(135deg, #fff4da, #fff9eb); }
    .theme-3 { background: linear-gradient(135deg, #f2ffe6, #f7ffef); }
    .theme-4 { background: linear-gradient(135deg, #ffe7f1, #fff1f7); }
    .theme-5 { background: linear-gradient(135deg, #ebe9ff, #f4f3ff); }

    .story-card {
      margin-bottom: 12px;
      border-radius: 16px;
      border: 1px solid color-mix(in srgb, var(--theme-line) 78%, white);
      padding: 12px 14px;
      background: color-mix(in srgb, var(--theme-page) 75%, white);
    }

    .story-card h3 {
      margin: 0 0 4px;
      font-size: 0.9rem;
      color: color-mix(in srgb, var(--theme-accent) 70%, #10274f);
    }

    .story-card p {
      margin: 0;
      font-size: 0.85rem;
      color: #293957;
      line-height: 1.55;
    }

    .scene {
      margin-top: 8px;
      font-size: 1.05rem;
      letter-spacing: 0.05em;
    }

    @media (max-width: 760px) {
      body { font-size: 22px; line-height: 1.8; }
      .day-grid { grid-template-columns: 1fr; }
      h1 { font-size: 1rem; }
    }

    @media print {
      header, .controls, .stepper, #indexView { display: none !important; }
      body { font-size: 14pt; background: #fff; }
      main { margin: 0; max-width: 100%; padding: 0; }
      .panel { box-shadow: none; border: none; border-radius: 0; padding: 0; }
      #dayView { display: block !important; }
      .section-card { page-break-inside: avoid; }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <h1>Grade 2 Math Enrichment Plan</h1>
      <button id="homeBtn" class="small-btn hidden">‚Üê Day Index</button>
    </div>
  </header>

  <main>

  <script>
    const categoryOrder = ["Easy", "Intermediate", "Pattern Recognition", "Hard", "Problem Solving"];
    const themes = [
      { name: "Nature Forest", icon: "üå≥", cls: "theme-1", scene: "üå≥ ü¶â üçÑ üåø", page: "#edf8ff", card: "#ffffff", line: "#cce3f4", glow: "rgba(17, 112, 173, 0.15)", accent: "#11609c" },
      { name: "Safari Animals", icon: "ü¶Å", cls: "theme-2", scene: "ü¶Å üêò ü¶í üåû", page: "#fff7e7", card: "#fffdf7", line: "#f3dba5", glow: "rgba(170, 114, 12, 0.18)", accent: "#a26402" },
      { name: "Ocean Friends", icon: "üê¨", cls: "theme-3", scene: "üê¨ üê¢ üêÝ üåä", page: "#ecfffb", card: "#fbfffe", line: "#bfeee2", glow: "rgba(10, 137, 116, 0.15)", accent: "#0d8a70" },
      { name: "Dinosaur Land", icon: "ü¶ï", cls: "theme-4", scene: "ü¶ï üåã ü•ö üå¥", page: "#fff1f7", card: "#fffafe", line: "#f1cade", glow: "rgba(179, 54, 120, 0.15)", accent: "#a42d70" },
      { name: "Space Mission", icon: "üöÄ", cls: "theme-5", scene: "üöÄ üåô ‚≠ê üõ∏", page: "#f2efff", card: "#fcfbff", line: "#d8d0ff", glow: "rgba(84, 74, 171, 0.18)", accent: "#5040b0" },
      { name: "Sky Aircraft", icon: "‚úàÔ∏è", cls: "theme-1", scene: "‚úàÔ∏è ‚òÅÔ∏è üå§Ô∏è ü™Å", page: "#eef8ff", card: "#ffffff", line: "#cbe2f4", glow: "rgba(20, 123, 173, 0.15)", accent: "#18679c" },
      { name: "Jungle Adventure", icon: "üêí", cls: "theme-2", scene: "üêí ü¶ú üçå üå¥", page: "#fff8e8", card: "#fffdf8", line: "#efddab", glow: "rgba(166, 125, 8, 0.18)", accent: "#996900" },
      { name: "Farm Day", icon: "üöú", cls: "theme-3", scene: "üöú üêÑ üåΩ üêì", page: "#effff0", card: "#fcfffc", line: "#cfeccf", glow: "rgba(63, 138, 58, 0.16)", accent: "#2c8a36" },
      { name: "Arctic Animals", icon: "üêß", cls: "theme-4", scene: "üêß ‚ùÑÔ∏è üêª‚Äç‚ùÑÔ∏è üßä", page: "#eef9ff", card: "#fbfeff", line: "#c9e5f5", glow: "rgba(36, 126, 173, 0.15)", accent: "#1c76a3" },
      { name: "Rainbow World", icon: "üåà", cls: "theme-5", scene: "üåà ‚òÅÔ∏è ü¶Ñ ‚ú®", page: "#f8f1ff", card: "#fffafe", line: "#e6d2ff", glow: "rgba(130, 74, 180, 0.18)", accent: "#8142c0" },
      { name: "Castle Quest", icon: "üè∞", cls: "theme-1", scene: "üè∞ üõ°Ô∏è üëë üêâ", page: "#eef4ff", card: "#fdfeff", line: "#d1ddfa", glow: "rgba(65, 98, 176, 0.15)", accent: "#3758a3" },
      { name: "Robot Lab", icon: "ü§ñ", cls: "theme-2", scene: "ü§ñ ‚öôÔ∏è üîã üí°", page: "#f6f7ff", card: "#fcfcff", line: "#d8daf6", glow: "rgba(100, 108, 176, 0.17)", accent: "#4450b5" },
      { name: "Pirate Bay", icon: "üè¥‚Äç‚òÝÔ∏è", cls: "theme-3", scene: "üè¥‚Äç‚òÝÔ∏è ‚öì üó∫Ô∏è üêö", page: "#edfbff", card: "#faffff", line: "#c8ebf4", glow: "rgba(17, 129, 150, 0.16)", accent: "#0f7589" },
      { name: "Superhero City", icon: "ü¶∏", cls: "theme-4", scene: "ü¶∏ üèôÔ∏è ‚ö° üõ°Ô∏è", page: "#fff0f5", card: "#fffcfe", line: "#f2cee0", glow: "rgba(184, 67, 130, 0.17)", accent: "#af2b79" },
      { name: "Solar System", icon: "ü™ê", cls: "theme-5", scene: "ü™ê ‚òÄÔ∏è üåå ‚≠ê", page: "#f1f0ff", card: "#fcfcff", line: "#d7d4ff", glow: "rgba(90, 78, 177, 0.18)", accent: "#5749b7" }
    ];

    const inspiration = [
      { title: "Quote", text: "‚ÄúTiny steps every day build giant math powers.‚Äù" },
      { title: "Mini Story", text: "Milo solved one puzzle before breakfast and said, ‚ÄúMy brain just did a happy jump!‚Äù" },
      { title: "Quote", text: "‚ÄúMistakes are clues that help us find smarter answers.‚Äù" },
      { title: "Mini Story", text: "A dinosaur counted 3 leaves, then 3 more, and roared, ‚ÄúI can multiply!‚Äù" },
      { title: "Quote", text: "‚ÄúCurious kids become clever problem solvers.‚Äù" },
      { title: "Mini Story", text: "A pilot practiced numbers daily and soon could map every cloud route." },
      { title: "Quote", text: "‚ÄúWhen learning feels hard, your brain is growing strong.‚Äù" },
      { title: "Mini Story", text: "On the farm, Mia grouped eggs in rows and discovered patterns everywhere." },
      { title: "Quote", text: "‚ÄúBe brave enough to try, and smart enough to try again.‚Äù" },
      { title: "Mini Story", text: "In Rainbow World, Kai fixed a tricky sum and shouted, ‚ÄúI did it!‚Äù" },
      { title: "Quote", text: "‚ÄúPractice turns ‚ÄòI can‚Äôt yet‚Äô into ‚ÄòI can now.‚Äô‚Äù" },
      { title: "Mini Story", text: "A robot kept testing ideas until the right answer beeped on screen." },
      { title: "Quote", text: "‚ÄúThink, test, and explore‚Äîmath is an adventure.‚Äù" },
      { title: "Mini Story", text: "A superhero used place value to save time and solve faster." },
      { title: "Quote", text: "‚ÄúYour effort is your superpower.‚Äù" }
    ];

    function seq(start, step, len) {
      return Array.from({ length: len }, (_, i) => start + step * i).join(", ") + ", ...";
    }

    function phase(day) {
      if (day <= 3) return 1;
      if (day <= 6) return 2;
      if (day <= 9) return 3;
      if (day <= 12) return 4;
      return 5;
    }

    function easy(day, session) {
      const n = day * 2 + session;
      if (phase(day) === 1) return [`${8+n} + ${5+session}`,`${17+n} - ${6+session}`,`${9+session} + ${9+day}`,`${20+n} - ${7+session}`,`${2+session} √ó ${3+(day%3)}`];
      if (phase(day) === 2) return [`${23+n} + ${14+session}`,`${56+n} - ${18+session}`,`${4+(day%4)} √ó ${6+session}`,`${31+n} + ${27+session}`,`${72+n} - ${26+session}`];
      if (phase(day) === 3) return [`${12+n} √ó ${3+session}`,`${145+n} - ${18+session}`,`${36+n} + ${27+session}`,`Write the value of the digit 6 in ${160+day*7}`,`${220+n} - ${90+session}`];
      if (phase(day) === 4) return [`${14+n} √ó ${11+session}`,`${32+n} √ó ${4+session}`,`Use partial products: (${20+n} + ${3+session}) √ó ${5+session}`,`${240+n} - ${85+session}`,`What is 9 groups of ${12+n}?`];
      return [`${120+n} √ó ${12+session}`,`${230+n} √ó ${11+session}`,`${340+n} - ${170+session}`,`Round ${670+n} to the nearest hundred.`,`${70+n} √ó ${13+session}`];
    }

    function intermediate(day, session) {
      const n = day + session;
      if (phase(day) === 1) return [`${14+n} + ${18+day}`,`${37+n} - ${19+session}`,`${5+session} √ó ${4+(day%2)}`,`${22+n} + ${29+day}`,`${60+n} - ${24+session}`];
      if (phase(day) === 2) return [`${46+n} + ${37+day}`,`${95+n} - ${48+session}`,`${7+session} √ó ${8+(day%2)}`,`${58+n} + ${26+day}`,`${84+n} - ${39+session}`];
      if (phase(day) === 3) return [`${23+n} √ó ${4+session}`,`${132+n} √ó ${3+session}`,`Break apart ${48+n} √ó ${5+session} into tens and ones.`,`What number is 300 more than ${245+n}?`,`${407+n} - ${129+session}`];
      if (phase(day) === 4) return [`${24+n} √ó ${13+session}`,`${35+n} √ó ${12+session}`,`Use distributive property: (${30+n} + 6) √ó ${7+session}`,`${620+n} - ${287+session}`,`Find the missing factor: ${144+n*2} = ${12+session} √ó ?`];
      return [`${214+n} √ó ${23+session}`,`${305+n} √ó ${14+session}`,`${432+n} + ${289+day}`,`Estimate ${398+n} √ó ${21+session} by rounding both numbers.`,`${705+n} - ${268+session}`];
    }

    function pattern(day, session) {
      const n = day + session;
      const stage = phase(day);
      if (stage === 1) return [
        `Number pattern: ${seq(2+n,2,4)} What comes next?`,
        `Shape pattern: ‚ñ≤ ‚ñÝ ‚ñ≤ ‚ñÝ ${day%2===0?"‚ñ≤":"‚ñÝ"} __`,
        `Skip count by 5: ${seq(5+5*session,5,4)} What is next?`,
        `Odd or even pattern: ${3+n}, ${4+n}, ${5+n}, ${6+n}, ${7+n}, __. Is the next number odd or even?`,
        `Object groups: ${"üçé".repeat(2+session)} | ${"üçé".repeat(3+session)} | ${"üçé".repeat(4+session)} | __`
      ];
      if (stage === 2) return [
        `Doubling pattern: ${3+n}, ${6+n*2}, ${12+n*4}, __`,
        `Direction pattern: up, down, up, down, ${day%2===0?"__":"up, __"}`,
        `Shape logic: ‚óè ‚óè ‚ñ≤ | ‚óè ‚óè ‚ñ≤ | ‚óè ‚óè ${day%2===0?"__":"‚ñ≤"}`,
        `Even numbers only: ${seq(10+n,2,4)} What comes next?`,
        `Size pattern: small, medium, large, small, medium, ${session===0?"__":"large"}`
      ];
      if (stage === 3) return [
        `Array pattern: ${2+session}√ó3, ${3+session}√ó3, ${4+session}√ó3, ${5+session}√ó3, __`,
        `Place-value pattern: ${120+n}, ${130+n}, ${140+n}, ${150+n}, __`,
        `Missing number pattern: __, ${24+n}, ${36+n}, ${48+n}, ${60+n}`,
        `Mirror pattern: ${session===0?"‚óÄ ‚ñ∂ ‚óÄ ‚ñ∂ ‚óÄ __":"‚ñ≤ ‚ñº ‚ñ≤ ‚ñº ‚ñ≤ __"}`,
        `Grouped objects: (‚óè‚óè) (‚óè‚óè‚óè‚óè) (‚óè‚óè‚óè‚óè‚óè‚óè) __`
      ];
      if (stage === 4) return [
        `Scaling pattern: ${6+n}, ${12+n*2}, ${24+n*4}, ${48+n*8}, __`,
        `Rotation pattern: ‚Üë, ‚Üí, ‚Üì, ‚Üê, ‚Üë, __`,
        `Symmetry check: Which has a line of symmetry? (A) ${session===0?"‚ñ≤":"‚óÜ"} (B) ‚ñ∂ (C) ${session===0?"‚ñÝ":"L-shape"}`,
        `Multiplication pattern: ${15+n}, ${30+n*2}, ${45+n*3}, ${60+n*4}, __`,
        `Place-value jump: ${205+n}, ${305+n}, ${405+n}, ${505+n}, __`
      ];
      return [
        `Advanced number pattern: ${7+n}, ${(7+n)*2}, ${(7+n)*4}, ${(7+n)*8}, __`,
        `Shape progression: ‚ñ≤, ‚ñ≤‚ñ≤, ‚ñ≤‚ñ≤‚ñ≤, ‚ñ≤‚ñ≤‚ñ≤‚ñ≤, __`,
        `Logic sequence: 2√ó3, 3√ó4, 4√ó5, 5√ó6, __`,
        `Multiplication scaling: ${25+n}, ${(25+n)*2}, ${(25+n)*4}, ${(25+n)*8}, __`,
        `Place-value + multiplication pattern: 111, 222, 444, 888, __`
      ];
    }

    function hard(day, session) {
      const n = day + session;
      if (phase(day) === 1) return [`${29+n} + ${34+day}`,`${81+n} - ${46+session}`,`${6+session} √ó ${7+(day%2)}`,`${43+n} + ${38+day}`,`${90+n} - ${37+session}`];
      if (phase(day) === 2) return [`${68+n} + ${47+day}`,`${122+n} - ${59+session}`,`${9+session} √ó ${7+(day%3)}`,`${85+n} - ${46+session}`,`${57+n} + ${58+day}`];
      if (phase(day) === 3) return [`${47+n} √ó ${6+session}`,`${238+n} √ó ${3+session}`,`${315+n} - ${147+session}`,`Find 4 √ó (${30+n} + ${8+session})`,`Write ${604+n} in expanded form.`];
      if (phase(day) === 4) return [`${46+n} √ó ${17+session}`,`${58+n} √ó ${16+session}`,`Use partial products for ${39+n} √ó ${14+session}`,`${804+n} - ${397+session}`,`If ${27+n} √ó ? = ${(27+n)*(9+session)}, what is ?`];
      if (day === 13) return [`124 √ó 23 (stretch)`,`${318+session} √ó 24`,`${452+session} √ó 31`,`${607+session} - 289`,`${215+session} √ó 42 (stretch)`];
      if (day === 14) return [`${426+session} √ó 35`,`${539+session} √ó 27`,`215 √ó 42 (stretch)`,`${782+session} - 468`,`${643+session} √ó 18`];
      return [`547 √ó 918 (stretch)`,`${732+session} √ó 46`,`${689+session} √ó 32`,`${950+session} - 487`,`${804+session} √ó 25`];
    }

    function problemSolving(day, session) {
      const n = day + session;
      if (phase(day) === 1) return [
        `Mia has ${8+n} apples. She gets ${6+day} more. How many apples now?`,
        `A shelf has ${19+n} books. ${7+session} are borrowed. How many are left?`,
        `There are ${3+session} bags with ${4+day} marbles in each bag. How many marbles?`,
        `Sam had ${15+n} stickers and gave away ${5+session}. How many stickers remain?`,
        `A class makes ${2+session} rows with ${5+day} chairs in each row. How many chairs?`
      ];
      if (phase(day) === 2) return [
        `There are ${6+session} boxes. Each box has ${7+day} crayons. How many crayons total?`,
        `Liam buys ${4+session} packs of balloons with ${8+day} balloons each. How many balloons?`,
        `A toy store had ${84+n} toys. It sold ${29+session}. How many toys are left?`,
        `Nora puts ${5+session} pencils in each of ${9+day} cups. How many pencils?`,
        `A library gets ${37+n} new books in the morning and ${26+day} in the afternoon. How many new books?`
      ];
      if (phase(day) === 3) return [
        `A farmer packs ${24+n} oranges in each crate. He fills ${3+session} crates. How many oranges?`,
        `There are ${132+n} stickers. ${4+session} children share them equally. How many per child?`,
        `A school buys ${16+n} boxes of pencils. Each box has ${9+session} pencils. How many pencils?`,
        `Ben reads ${28+n} pages each day for ${3+session} days. How many pages in all?`,
        `A bus has ${245+n} seats. ${127+session} are filled. How many empty seats?`
      ];
      if (phase(day) === 4) return [
        `A shop has ${18+n} shelves. Each shelf has ${14+session} books. How many books total?`,
        `Each table has ${12+session} chairs. There are ${23+n} tables. How many chairs?`,
        `A school ordered ${34+n} packs of paper. Each pack has ${25+session} sheets. How many sheets?`,
        `Tia had ${640+n} stickers. She gave ${285+session} away and then got 120 more. How many now?`,
        `A game store sold ${27+n} toy cars each day for ${6+session} days. How many toy cars?`
      ];
      if (day === 13) return [
        `A factory packs 124 pencils in each box and makes 23 boxes. How many pencils?`,
        `A reading club has 215 students. Each gets 42 stickers. How many stickers are needed?`,
        `A truck carries ${326+session} boxes. Each box has 28 books. How many books?`,
        `A shop had 980 balloons. It sold 365 in the morning and 214 in the afternoon. How many left?`,
        `A garden has 36 rows with 27 plants in each row. How many plants total?`
      ];
      if (day === 14) return [
        `A school buys ${248+session} notebooks for each of 32 classes. How many notebooks?`,
        `A farmer packs 215 apples in each crate and sends 42 crates. How many apples?`,
        `A toy company made ${407+session} robots each week for 24 weeks. How many robots?`,
        `A hall has 1,200 chairs. 468 are used in one event and 327 in another. How many chairs stay empty?`,
        `A bakery uses 38 trays with 26 cookies on each tray. How many cookies?`
      ];
      return [
        `A giant warehouse ships 547 boxes each day for 918 days (stretch). How many boxes?`,
        `A school has ${352+session} students. Each needs 24 pencils. How many pencils?`,
        `A library stacks ${418+session} books on each of 36 shelves. How many books?`,
        `A theater sold 2,000 tickets. 785 were sold on Friday and 649 on Saturday. How many are left?`,
        `A toy fair has 125 booths. Each booth sells 43 toys. How many toys in all?`
      ];
    }

    function dayData(day) {
      return {
        day,
        note: day <= 3 ? "Addition/Subtraction review + first multiplication ideas" :
              day <= 6 ? "2-digit operations + stronger multiplication facts" :
              day <= 9 ? "2-digit and 3-digit by 1-digit + place value" :
              day <= 12 ? "2-digit by 2-digit with distributive thinking" :
                          "3-digit by 2-digit and stretch 3-digit by 3-digit",
        theme: themes[day - 1],
        sessions: {
          morning: {
            name: "Morning Session",
            categories: {
              "Easy": easy(day, 0),
              "Intermediate": intermediate(day, 0),
              "Pattern Recognition": pattern(day, 0),
              "Hard": hard(day, 0),
              "Problem Solving": problemSolving(day, 0)
            }
          },
          afternoon: {
            name: "Afternoon Session",
            categories: {
              "Easy": easy(day, 1),
              "Intermediate": intermediate(day, 1),
              "Pattern Recognition": pattern(day, 1),
              "Hard": hard(day, 1),
              "Problem Solving": problemSolving(day, 1)
            }
          }
        }
      };
    }

    const plan = Array.from({ length: 15 }, (_, i) => dayData(i + 1));

    const indexView = document.getElementById("indexView");
    const dayView = document.getElementById("dayView");
    const homeBtn = document.getElementById("homeBtn");

    const state = {
      currentDay: null,
      session: "morning",
      categoryIndex: 0
    };

    function applyTheme(theme) {
      const headers = {
        "theme-1": "linear-gradient(135deg, #dff4ff, #eef8ff)",
        "theme-2": "linear-gradient(135deg, #fff4da, #fff9eb)",
        "theme-3": "linear-gradient(135deg, #f2ffe6, #f7ffef)",
        "theme-4": "linear-gradient(135deg, #ffe7f1, #fff1f7)",
        "theme-5": "linear-gradient(135deg, #ebe9ff, #f4f3ff)"
      };
      document.documentElement.style.setProperty("--theme-page", theme.page);
      document.documentElement.style.setProperty("--theme-card", theme.card);
      document.documentElement.style.setProperty("--theme-line", theme.line);
      document.documentElement.style.setProperty("--theme-glow", theme.glow);
      document.documentElement.style.setProperty("--theme-accent", theme.accent);
      document.documentElement.style.setProperty("--theme-header", headers[theme.cls] || headers["theme-1"]);
    }

    function renderIndex() {
      applyTheme({
        page: "#f5f8ff",
        card: "#ffffff",
        line: "#d8e1f2",
        glow: "rgba(15, 23, 42, 0.07)",
        accent: "#1d4ed8",
        cls: "theme-1"
      });
      indexView.classList.remove("hidden");
      dayView.classList.add("hidden");
      homeBtn.classList.add("hidden");

      let html = `
        <h2 class="index-title">Choose a Day</h2>
        <p class="index-help">Tap a day to open it. In each day, Easy questions open first. Use Next to move through each set of 5 questions.</p>
        <div class="day-grid">
      `;

      plan.forEach((d) => {
        html += `
          <button class="day-link" data-day="${d.day}">
            <strong>Day ${d.day} ${d.theme.icon}</strong>
            <span>${d.note}</span>
            <span class="theme-badge">Theme: ${d.theme.name}</span>
          </button>
        `;
      });

      html += `</div>`;
      indexView.innerHTML = html;

      indexView.querySelectorAll(".day-link").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.currentDay = Number(btn.dataset.day);
          state.session = "morning";
          state.categoryIndex = 0;
          renderDay();
          window.scrollTo({ top: 0, behavior: "smooth" });
        });
      });
    }

    function renderDay() {
      const d = plan[state.currentDay - 1];
      const sessionObj = d.sessions[state.session];
      const catName = categoryOrder[state.categoryIndex];
      const qs = sessionObj.categories[catName];
      const dayInspiration = inspiration[d.day - 1];
      applyTheme(d.theme);

      indexView.classList.add("hidden");
      dayView.classList.remove("hidden");
      homeBtn.classList.remove("hidden");

      dayView.innerHTML = `
        <div class="day-header ${d.theme.cls}">
          <h2>Day ${d.day} ${d.theme.icon} ‚Äî ${d.theme.name}</h2>
          <p>${d.note}</p>
          <div class="scene" aria-hidden="true">${d.theme.scene}</div>
        </div>

        <article class="story-card">
          <h3>${dayInspiration.title} to Start the Day ‚ú®</h3>
          <p>${dayInspiration.text}</p>
        </article>

        <div class="controls">
          <button class="select-btn ${state.session === "morning" ? "active" : ""}" data-session="morning">Morning Session</button>
          <button class="select-btn ${state.session === "afternoon" ? "active" : ""}" data-session="afternoon">Afternoon Session</button>
        </div>

        <article class="section-card">
          <h3 class="section-title">${catName} (5 questions)</h3>
          <p class="section-subtitle">${sessionObj.name} ‚Ä¢ Write answers on paper</p>
          <ol>
            ${qs.map((q) => `<li>${q}</li>`).join("")}
          </ol>
          <div class="progress">Category ${state.categoryIndex + 1} of 5 in this session</div>
        </article>

        <div class="stepper">
          <button id="prevSet" ${state.categoryIndex === 0 ? "disabled" : ""}>‚Üê Previous 5</button>
          <button id="nextSet" ${state.categoryIndex === 4 ? "disabled" : ""}>Next 5 ‚Üí</button>
        </div>
      `;

      dayView.querySelectorAll(".select-btn").forEach((btn) => {
        btn.addEventListener("click", () => {
          state.session = btn.dataset.session;
          state.categoryIndex = 0;
          renderDay();
        });
      });

      dayView.querySelector("#prevSet").addEventListener("click", () => {
        if (state.categoryIndex > 0) {
          state.categoryIndex -= 1;
          renderDay();
        }
      });

      dayView.querySelector("#nextSet").addEventListener("click", () => {
        if (state.categoryIndex < 4) {
          state.categoryIndex += 1;
          renderDay();
        }
      });
    }

    homeBtn.addEventListener("click", renderIndex);
    renderIndex();
  </script>
</body>
</html>
