<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parent Dashboard</title>
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body data-page="parent">
  <header class="top-nav">
    <div class="nav-left"><strong>Parent Dashboard</strong></div>
    <div class="nav-right"><a class="btn" href="index.html">&#x1F3E0; Home</a></div>
  </header>
  <main class="container">
    <section class="card"><h1>Score History & Trends</h1></section>
    <section class="card">
      <div class="button-row">
        <button class="btn" type="button" data-clear-parent-scores>Clear Score History</button>
      </div>
    </section>
    <section class="card summary-grid" data-parent-summary></section>
    <section class="parent-layout">
      <section class="card">
        <h3>Add score entry</h3>
        <form data-score-form>
          <div class="parent-form-grid">
            <label>Day<select name="day" required data-day-options></select></label>
            <label>Session<select name="session" required><option value="morning">Morning</option><option value="afternoon">Afternoon</option></select></label>
            <label>Section<select name="section"><option value="">Session only</option></select></label>
            <label>Source<select name="source"><option value="required">required</option><option value="bonus">bonus</option></select></label>
            <label>Score<input name="score" type="number" min="0" required /></label>
            <label>Max Score<input name="maxScore" type="number" min="1" required /></label>
            <label>Time (seconds)<input name="timeSeconds" type="number" min="0" /></label>
            <label class="full">Notes<textarea name="notes"></textarea></label>
          </div>
          <button class="btn btn-primary" type="submit">Save Score</button>
        </form>
      </section>
      <section class="card">
        <h3>Filters</h3>
        <div class="parent-form-grid">
          <label>Day<select data-filter-day><option value="">All days</option></select></label>
          <label>Session<select data-filter-session><option value="">All sessions</option><option value="morning">Morning</option><option value="afternoon">Afternoon</option></select></label>
          <label>Section<select data-filter-section><option value="">All sections</option></select></label>
          <label>Source<select data-filter-source><option value="">All sources</option><option value="required">required</option><option value="bonus">bonus</option></select></label>
        </div>
      </section>
    </section>
    <section class="card trend-chart"><h3>Score Trend</h3><svg class="trend-svg" data-score-trend viewBox="0 0 100 40"></svg></section>
    <section class="card table-wrap"><h3>History</h3><table><thead><tr><th>Date</th><th>Day</th><th>Session</th><th>Section</th><th>Source</th><th>Score</th><th>%</th><th>Notes</th><th>Actions</th></tr></thead><tbody data-history-body></tbody></table></section>
  </main>
  <script type="module" src="assets/js/app.js"></script>
</body>
</html>
